<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKLRACING | Live Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,700;1,900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #ffcc00; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); --white: #fff; --red: #ff3e3e; }
        body { margin: 0; font-family: 'Oswald', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; border-bottom: 2px solid var(--yellow); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Kanit'; font-size: 1.6rem; color: var(--yellow); cursor: pointer; text-transform: uppercase; }
        .nav-links span { margin-left: 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.8rem; color: #aaa; transition: 0.3s; }
        .nav-links span:hover { color: var(--yellow); }
        .view { display: none; padding: 40px 5%; animation: fadeIn 0.4s ease; min-height: 80vh; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hero { text-align: center; padding: 80px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1532906619279-a4b7267faa66?auto=format&fit=crop&q=80&w=1200'); background-size: cover; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin: 0 5%; }
        .main-clock { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; color: var(--yellow); font-family: 'Kanit'; }
        .card { background: var(--glass); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; backdrop-filter: blur(5px); }
        input, select, textarea { background: #111; border: 1px solid #333; color: white; padding: 12px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 5px; font-family: inherit; }
        .btn { background: var(--yellow); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; width: 100%; border-radius: 5px; text-transform: uppercase; }
        .btn-danger { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #login-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--yellow); padding: 15px; border-bottom: 2px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="card" style="width: 300px; text-align: center;">
            <h2 style="color:var(--yellow)">ADMIN LOGIN</h2>
            <input type="password" id="pass-input" placeholder="Enter Password">
            <button class="btn" onclick="checkAuth()">UNLOCK</button>
            <p onclick="showView('home')" style="cursor:pointer; margin-top:15px; font-size: 0.8rem; opacity: 0.5;">Return Home</p>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="showView('home')">JKL<span style="color:white">RACING</span></div>
        <div class="nav-links">
            <span onclick="showView('home')">Home</span>
            <span onclick="showView('schedule')">Schedule</span>
            <span onclick="showView('points')">Standings</span>
            <span onclick="showView('nominations')">Nominations</span>
            <span onclick="showView('admin')">Admin</span>
        </div>
    </nav>

    <section id="home" class="view active">
        <div class="hero">
            <h1 style="letter-spacing: 5px; opacity: 0.6; font-size: 0.9rem; margin-bottom: 10px;">RACE COUNTDOWN</h1>
            <div class="main-clock" id="main-clock">00:00:00:00</div>
            <h2 id="h-loc" style="margin-top:20px; color:var(--yellow); text-transform: uppercase;">LOADING...</h2>
        </div>
    </section>

    <section id="schedule" class="view">
        <h1 style="color:var(--yellow)">2026 RACE CALENDAR</h1>
        <div id="sched-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;"></div>
    </section>

    <section id="points" class="view">
        <h1 style="color:var(--yellow)">CHAMPIONSHIP STANDINGS</h1>
        <div class="card">
            <table>
                <thead><tr><th>Pos</th><th>Driver</th><th>Points</th></tr></thead>
                <tbody id="points-table"></tbody>
            </table>
        </div>
    </section>

    <section id="nominations" class="view">
        <h1 style="text-align:center; color:var(--yellow)">FAN NOMINATIONS</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto;">
            <div class="card">
                <h3>Submit Nomination</h3>
                <select id="nom-track-select"></select>
                <input type="text" id="nom-driver" placeholder="Driver Name">
                <textarea id="nom-reason" rows="3" placeholder="Why?"></textarea>
                <button class="btn" onclick="submitNom()">SUBMIT</button>
            </div>
            <div class="card">
                <h3>Public Feed</h3>
                <div id="public-feed" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </section>

    <section id="admin" class="view">
        <h1 style="color:var(--yellow)">COMMAND CENTER</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;">
            <div class="card">
                <h3>Manage Races</h3>
                <input type="text" id="add-track" placeholder="Track Name">
                <input type="text" id="add-event" placeholder="Event Name">
                <input type="datetime-local" id="add-date">
                <button class="btn" onclick="addRace()">ADD RACE</button>
                <div id="admin-race-list" style="margin-top:20px;"></div>
            </div>
            <div class="card">
                <h3>Manage Points</h3>
                <input type="text" id="d-name" placeholder="Driver Name">
                <input type="number" id="d-pts" placeholder="Points">
                <button class="btn" onclick="updatePoints()">UPDATE DRIVER</button>
                <div id="admin-driver-list" style="margin-top:20px;"></div>
            </div>
            <div class="card">
                <h3>Nomination Inbox</h3>
                <div id="admin-inbox"></div>
                <button class="btn" style="background:#444; color:white; margin-top:10px;" onclick="clearNoms()">CLEAR ALL NOMS</button>
            </div>
        </div>
    </section>

    <script>
        // --- YOUR CONNECTED KEYS ---
        const SUPABASE_URL = "https://cacwhcuupqgbdhumcogs.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_9NWeiWZZ68zklRE3-Q5Q1g_-HAf0MZT";
        const ADMIN_PASS = "Walter"; // PASSWORD UPDATED TO WALTER

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let targetDate = null;
        let isAuth = false;

        function showView(id) {
            if(id === 'admin' && !isAuth) { document.getElementById('login-gate').style.display='flex'; return; }
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('login-gate').style.display='none';
            fetchData();
        }

        function checkAuth() {
            if(document.getElementById('pass-input').value === ADMIN_PASS) { 
                isAuth = true; 
                showView('admin'); 
            } else { 
                alert("WRONG PASSWORD"); 
                showView('home'); 
            }
        }

        async function fetchData() {
            // RACES
            const { data: races } = await _supabase.from('races').select('*').order('race_date', { ascending: true });
            if(races && races.length > 0) {
                targetDate = new Date(races[0].race_date).getTime();
                document.getElementById('h-loc').innerText = `${races[0].track} - ${races[0].event_name}`;
                document.getElementById('sched-list').innerHTML = races.map(r => `<div class="card"><h3>${r.track}</h3><p>${r.event_name}</p><small>${new Date(r.race_date).toLocaleString()}</small></div>`).join('');
                document.getElementById('admin-race-list').innerHTML = races.map(r => `<div class="row"><span>${r.track}</span><button class="btn-danger" onclick="deleteItem('races','${r.id}')">DEL</button></div>`).join('');
                document.getElementById('nom-track-select').innerHTML = races.map(r => `<option value="${r.track}">${r.track}</option>`).join('');
            } else { document.getElementById('h-loc').innerText = "SEASON OVER"; }

            // STANDINGS
            const { data: points } = await _supabase.from('standings').select('*').order('points', { ascending: false });
            if(points) {
                document.getElementById('points-table').innerHTML = points.map((p, i) => `<tr><td>${i+1}</td><td>${p.driver_name}</td><td>${p.points}</td></tr>`).join('');
                document.getElementById('admin-driver-list').innerHTML = points.map(p => `<div class="row"><span>${p.driver_name} (${p.points})</span><button class="btn-danger" onclick="deleteItem('standings','${p.id}')">DEL</button></div>`).join('');
            }

            // NOMS
            const { data: noms } = await _supabase.from('nominations').select('*').order('created_at', { ascending: false });
            if(noms) {
                document.getElementById('public-feed').innerHTML = noms.map(n => `<div class="row"><span><strong>${n.driver_name}</strong> nominated for ${n.track}</span></div>`).join('');
                document.getElementById('admin-inbox').innerHTML = noms.map(n => `<div style="padding:10px; border-bottom:1px solid #333;"><strong>${n.driver_name}</strong>: ${n.reason}</div>`).join('');
            }
        }

        async function addRace() {
            const track = document.getElementById('add-track').value;
            const event_name = document.getElementById('add-event').value;
            const race_date = document.getElementById('add-date').value;
            await _supabase.from('races').insert([{ track, event_name, race_date }]);
            fetchData();
        }

        async function updatePoints() {
            const driver_name = document.getElementById('d-name').value;
            const points = document.getElementById('d-pts').value;
            await _supabase.from('standings').upsert({ driver_name, points }, { onConflict: 'driver_name' });
            fetchData();
        }

        async function submitNom() {
            const driver_name = document.getElementById('nom-driver').value;
            const track = document.getElementById('nom-track-select').value;
            const reason = document.getElementById('nom-reason').value;
            await _supabase.from('nominations').insert([{ driver_name, track, reason }]);
            alert("Sent!");
            fetchData();
        }

        async function deleteItem(table, id) { if(confirm("Delete?")) { await _supabase.from(table).delete().eq('id', id); fetchData(); } }
        async function clearNoms() { if(confirm("Clear all noms?")) { await _supabase.from('nominations').delete().neq('driver_name', '0'); fetchData(); } }

        setInterval(() => {
            const clock = document.getElementById('main-clock');
            if(!targetDate) return;
            const diff = targetDate - new Date().getTime();
            if(diff <= 0) { clock.innerText = "RACE TIME"; return; }
            const d = Math.floor(diff/86400000), h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
            clock.innerText = `${d.toString().padStart(2,'0')}:${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);

        fetchData();
    </script>
</body>
</html>
