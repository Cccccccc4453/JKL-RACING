<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKLRACING | Live Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #ffcc00; --dark: #000000; --white: #fff; }
        body { margin: 0; font-family: 'Oswald', sans-serif; background: var(--dark); color: var(--white); overflow: hidden; }
        
        /* Smaller, tighter Nav */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: #000; border-bottom: 2px solid var(--yellow); height: 60px; }
        .logo-img { height: 50px; cursor: pointer; }

        /* Smaller Hero footprint */
        .hero { text-align: center; padding: 40px 10px; background: #000; display: flex; flex-direction: column; justify-content: center; min-height: 250px; }
        
        /* Smaller, more compact Timer */
        .main-clock { 
            font-size: clamp(2.5rem, 16vw, 9rem); 
            font-weight: 900; 
            color: var(--yellow); 
            font-family: 'Kanit', sans-serif; 
            letter-spacing: -3px;
            line-height: 1;
            margin: 10px 0;
        }

        #h-loc { color: var(--yellow); text-transform: uppercase; font-size: 1.2rem; margin: 0; letter-spacing: 1px; opacity: 0.8; }
        
        .view { display: none; padding: 20px 5%; }
        .view.active { display: block; }
        .card { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; max-width: 500px; margin: auto; }
        .btn { background: var(--yellow); color: #000; border: none; padding: 12px; font-weight: 900; cursor: pointer; width: 100%; border-radius: 4px; text-transform: uppercase; margin-top: 10px; }
        input { background: #0a0a0a; border: 1px solid #333; color: white; padding: 12px; width: 100%; box-sizing: border-box; margin: 8px 0; border-radius: 4px; }
        .label-tiny { color:#444; letter-spacing:3px; font-weight:700; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <img id="nav-logo" class="logo-img" onclick="showView('home')" alt="JKL Racing">
        <div style="cursor:pointer; font-size: 0.8rem; font-weight:bold; color: var(--yellow);" onclick="showView('admin')">ADMIN PANEL</div>
    </nav>

    <section id="home" class="view active">
        <div class="hero">
            <div class="label-tiny">Race Starting In</div>
            <div class="main-clock" id="main-clock">00:00:00:00</div>
            <h2 id="h-loc">Loading...</h2>
        </div>
    </section>

    <section id="admin" class="view">
        <div class="card">
            <h3 style="margin-top:0; color:var(--yellow);">SET RACE TIME</h3>
            <input type="text" id="add-track" placeholder="Track Name">
            <input type="datetime-local" id="add-date">
            <button class="btn" onclick="addRace()">Update Countdown</button>
            <p style="font-size:0.7rem; color:#555; text-align:center; margin-top:10px;">Home screen will refresh after update.</p>
        </div>
    </section>

    <script>
        const SUPABASE_URL = "https://cacwhcuupqgbdhumcogs.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_9NWeiWZZ68zklRE3-Q5Q1g_-HAf0MZT";
        const LOGO_URL = "https://cacwhcuupqgbdhumcogs.supabase.co/storage/v1/object/public/logos/JKL_Racing_1_2.png";
        
        document.getElementById('nav-logo').src = LOGO_URL;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let targetDate = null;

        async function fetchData() {
            const { data: races } = await _supabase.from('races').select('*').order('race_date', { ascending: true });
            if(races && races.length > 0) {
                const nextRace = races.find(r => new Date(r.race_date) > new Date()) || races[0];
                targetDate = new Date(nextRace.race_date).getTime();
                document.getElementById('h-loc').innerText = nextRace.track;
            }
        }

        setInterval(() => {
            if(!targetDate) return;
            const now = new Date().getTime();
            const diff = targetDate - now;
            const clock = document.getElementById('main-clock');

            if (diff <= 0) {
                clock.innerText = "00:00:00:00";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            const pad = (n) => String(n).padStart(2, '0');
            clock.innerText = `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}`;
        }, 1000);

        async function addRace() {
            const track = document.getElementById('add-track').value;
            const date = document.getElementById('add-date').value;
            if(!track || !date) return alert("Please fill in both fields.");
            await _supabase.from('races').insert([{ track: track, race_date: date }]);
            location.reload(); 
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        fetchData();
    </script>
</body>
</html>
