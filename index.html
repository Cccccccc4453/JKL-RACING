<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKLRACING | Live Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --yellow: #ffcc00; --dark: #000000; --glass: rgba(255, 255, 255, 0.05); --white: #fff; --red: #ff3e3e; }
        body { margin: 0; font-family: 'Oswald', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #000; border-bottom: 2px solid var(--yellow); position: sticky; top: 0; z-index: 1000; height: 80px; }
        .logo-img { height: 70px; cursor: pointer; transition: 0.2s; }
        .logo-img:hover { transform: scale(1.03); }
        .nav-links span { margin-left: 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; color: #888; transition: 0.3s; }
        .nav-links span:hover { color: var(--yellow); }

        /* Hero & Timer Section */
        .hero { text-align: center; padding: 100px 20px; background: #000; border-bottom: 1px solid #222; margin-bottom: 40px; }
        .event-label { letter-spacing: 8px; color: #444; font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; }
        .main-clock { 
            font-size: clamp(3.5rem, 20vw, 12rem); 
            font-weight: 900; 
            color: var(--yellow); 
            font-family: 'Kanit', sans-serif; 
            letter-spacing: -5px;
            line-height: 0.8;
            margin: 20px 0;
        }
        #h-loc { color: var(--yellow); text-transform: uppercase; font-size: clamp(1.5rem, 5vw, 2.5rem); margin: 0; opacity: 0.9; }

        /* General Layout */
        .view { display: none; padding: 20px 5%; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #111; padding: 25px; border-radius: 10px; border: 1px solid #222; margin-bottom: 20px; }
        
        /* Admin & Forms */
        input, select, textarea { background: #0a0a0a; border: 1px solid #333; color: white; padding: 15px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 4px; font-family: inherit; font-size: 1rem; }
        .btn { background: var(--yellow); color: #000; border: none; padding: 18px; font-weight: 900; cursor: pointer; width: 100%; border-radius: 4px; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .btn:hover { background: #e6b800; }
        .btn-danger { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* Maintenance Screen */
        #m-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #login-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--yellow); border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

    <div id="m-screen">
        <h1 style="color:var(--yellow); font-family: 'Kanit'; font-size: 5rem; margin:0;">CLOSED</h1>
        <p style="letter-spacing: 3px;">MAINTENANCE IN PROGRESS</p>
    </div>

    <div id="login-gate">
        <div class="card" style="width: 320px; text-align: center;">
            <h2 style="color:var(--yellow)">ADMIN LOGIN</h2>
            <input type="password" id="pass-input" placeholder="Password">
            <button onclick="checkAuth()" class="btn">UNLOCK</button>
            <p onclick="document.getElementById('login-gate').style.display='none'" style="cursor:pointer; margin-top:20px; opacity: 0.5;">Cancel</p>
        </div>
    </div>

    <nav>
        <img id="nav-logo" class="logo-img" onclick="showView('home')" alt="JKL Racing">
        <div class="nav-links">
            <span onclick="showView('home')">Home</span>
            <span onclick="showView('schedule')">Schedule</span>
            <span onclick="showView('points')">Standings</span>
            <span onclick="showView('nominations')">Nominations</span>
            <span onclick="showView('admin')">Admin</span>
        </div>
    </nav>

    <section id="home" class="view active">
        <div class="hero">
            <div class="event-label">Next Event Start</div>
            <div class="main-clock" id="main-clock">00:00:00:00</div>
            <h2 id="h-loc">LOADING RACE DATA...</h2>
        </div>
    </section>

    <section id="schedule" class="view">
        <h1 style="color:var(--yellow)">RACE CALENDAR</h1>
        <div id="sched-list"></div>
    </section>
    
    <section id="points" class="view">
        <h1 style="color:var(--yellow)">STANDINGS</h1>
        <div class="card"><table><thead><tr><th>POS</th><th>DRIVER</th><th>PTS</th></tr></thead><tbody id="points-table"></tbody></table></div>
    </section>

    <section id="nominations" class="view">
        <h1 style="text-align:center; color:var(--yellow)">DRIVER NOMINATIONS</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="card">
                <h3>Submit Nomination</h3>
                <select id="nom-track-select"><option value="">Select Track</option></select>
                <input type="text" id="nom-driver" placeholder="Driver Name">
                <textarea id="nom-reason" placeholder="Reasoning..." rows="4"></textarea>
                <button class="btn" onclick="submitNom()">SUBMIT</button>
            </div>
            <div class="card"><h3>Live Feed</h3><div id="public-feed"></div></div>
        </div>
    </section>

    <section id="admin" class="view">
        <h1 style="color:var(--yellow)">ADMIN COMMAND</h1>
        <div class="card"><button class="btn" id="m-toggle-btn" onclick="toggleMaintenance()">TOGGLE MAINTENANCE</button></div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;">
            <div class="card"><h3>Add Race</h3><input type="text" id="add-track" placeholder="Track Name"><input type="datetime-local" id="add-date"><button class="btn" onclick="addRace()">ADD RACE</button><div id="admin-race-list" style="margin-top:20px;"></div></div>
            <div class="card"><h3>Update Points</h3><input type="text" id="d-name" placeholder="Driver"><input type="number" id="d-pts" placeholder="Points"><button class="btn" onclick="updatePoints()">SAVE POINTS</button><div id="admin-driver-list" style="margin-top:20px;"></div></div>
            <div class="card"><h3>Nominations Inbox</h3><div id="admin-inbox"></div></div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = "https://cacwhcuupqgbdhumcogs.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_9NWeiWZZ68zklRE3-Q5Q1g_-HAf0MZT";
        const ADMIN_PASS = "Walter";
        const LOGO_URL = "https://cacwhcuupqgbdhumcogs.supabase.co/storage/v1/object/public/logos/JKL_Racing_1_2.png";
        
        document.getElementById('nav-logo').src = LOGO_URL;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let targetDate = null, isAuth = false, maintenanceActive = false;

        async function fetchData() {
            try {
                const { data: set } = await _supabase.from('site_settings').select('*').eq('id', 'global_config').maybeSingle();
                if(set) {
                    maintenanceActive = set.maintenance_on;
                    document.getElementById('m-screen').style.display = (maintenanceActive && !isAuth) ? 'flex' : 'none';
                    document.getElementById('m-toggle-btn').innerText = maintenanceActive ? "SITE: OFF (MAINTENANCE)" : "SITE: ON (LIVE)";
                }

                const { data: races } = await _supabase.from('races').select('*').order('race_date', { ascending: true });
                if(races && races.length > 0) {
                    const nextRace = races.find(r => new Date(r.race_date) > new Date()) || races[0];
                    targetDate = new Date(nextRace.race_date).getTime();
                    document.getElementById('h-loc').innerText = nextRace.track;
                    document.getElementById('sched-list').innerHTML = races.map(r => `<div class="card"><strong>${r.track}</strong><br><small>${new Date(r.race_date).toLocaleString()}</small></div>`).join('');
                    document.getElementById('admin-race-list').innerHTML = races.map(r => `<div>${r.track} <button class="btn-danger" onclick="deleteItem('races','${r.id}')">X</button></div>`).join('');
                    document.getElementById('nom-track-select').innerHTML = races.map(r => `<option value="${r.track}">${r.track}</option>`).join('');
                }

                const { data: pts } = await _supabase.from('standings').select('*').order('points', {ascending:false});
                if(pts) {
                    document.getElementById('points-table').innerHTML = pts.map((p,i) => `<tr><td>${i+1}</td><td>${p.driver_name}</td><td>${p.points}</td></tr>`).join('');
                    document.getElementById('admin-driver-list').innerHTML = pts.map(p => `<div>${p.driver_name} (${p.points}) <button class="btn-danger" onclick="deleteItem('standings','${p.id}')">X</button></div>`).join('');
                }

                const { data: noms } = await _supabase.from('nominations').select('*').order('created_at', {ascending:false});
                if(noms) {
                    document.getElementById('public-feed').innerHTML = noms.map(n => `<div style="padding:10px; border-bottom:1px solid #222;"><strong>${n.driver_name}</strong> - ${n.track}</div>`).join('');
                    document.getElementById('admin-inbox').innerHTML = noms.map(n => `<div style="padding:10px; border-bottom:1px solid #222;">${n.driver_name}: ${n.reason} <button class="btn-danger" onclick="deleteItem('nominations','${n.id}')">X</button></div>`).join('');
                }
            } catch(e) { console.error("Sync Error"); }
        }

        // Countdown Timer
        setInterval(() => {
            if(!targetDate) return;
            const diff = targetDate - new Date().getTime();
            const clock = document.getElementById('main-clock');
            if(diff <= 0) { clock.innerText = "00:00:00:00"; return; }
            const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
            const pad = (n) => n.toString().padStart(2, '0');
            clock.innerText = `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}`;
        }, 1000);

        function showView(id) {
            if(id === 'admin' && !isAuth) { document.getElementById('login-gate').style.display='flex'; return; }
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('login-gate').style.display='none';
            fetchData();
        }

        function checkAuth() {
            if(document.getElementById('pass-input').value === ADMIN_PASS) { isAuth = true; showView('admin'); }
            else alert("Wrong Password");
        }

        async function toggleMaintenance() { await _supabase.from('site_settings').update({ maintenance_on: !maintenanceActive }).eq('id', 'global_config'); fetchData(); }
        async function addRace() { await _supabase.from('races').insert([{ track: document.getElementById('add-track').value, race_date: document.getElementById('add-date').value }]); fetchData(); }
        async function updatePoints() { await _supabase.from('standings').upsert({ driver_name: document.getElementById('d-name').value, points: parseInt(document.getElementById('d-pts').value) }, { onConflict: 'driver_name' }); fetchData(); }
        async function submitNom() { await _supabase.from('nominations').insert([{ driver_name: document.getElementById('nom-driver').value, track: document.getElementById('nom-track-select').value, reason: document.getElementById('nom-reason').value }]); alert("Nomination Sent!"); fetchData(); }
        async function deleteItem(t, id) { if(confirm("Delete this?")) { await _supabase.from(t).delete().eq('id', id); fetchData(); } }

        _supabase.channel('db').on('postgres_changes',{event:'*',schema:'public'},()=>fetchData()).subscribe();
        fetchData();
    </script>
</body>
</html>
